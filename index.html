<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RFC-DoC-Atlas</title>
  <link rel="icon" type=image/ico href="icon.ico">
  <link rel="stylesheet" href="style.css">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

  </style>
</head>
<body>

<div class="container">
  <div class="content">



<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Layers:</h3>

  <div class="options-container">
    <details open>
        <summary>Outline</summary>
        <label class="option"><input type="checkbox" data-target="overlay_outline"> outline</label>
    </details>

    <details map>
        <summary>Core</summary>
        <label class="option"><input type="checkbox"> Civ 1</label>
        <label class="option"><input type="checkbox"> Civ 2</label>
    </details>

    <details>
        <summary>Spawn</summary>
        <label class="option"><input type="checkbox"> Civ 1</label>
        <label class="option"><input type="checkbox"> Civ 2</label>
    </details>

    <details>
        <summary>UHV</summary>
        <label class="option"><input type="checkbox"> Goal 1</label>
        <label class="option"><input type="checkbox"> Goal 2</label>
    </details>

    <details>
        <summary>Geography</summary>
        <label class="option"><input type="checkbox"> Regions</label>
        <label class="option"><input type="checkbox"> Continents</label>
    </details>

    <details>
        <summary>Religion</summary>
        <label class="option"><input type="checkbox"> Christianity</label>
        <label class="option"><input type="checkbox"> Islam</label>
    </details>
  </div>

</div>
<!-- MAP -->
<div class="map-container-outer" id="map">
  <div class="map-container-inner">
   <img src="maps/World.jpg" alt="Map">
   <img id="overlay_outline" src="maps/tile_outline.png" class="overlay">
  </div>
  </div>

  </div>
</div>
<script src="script.js"></script>
</body>
</html>
